<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Buy Shop - All in One</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); align-items: center; justify-content: center; z-index: 50; }
        .modal.active { display: flex; }
    </style>
</head>
<body class="bg-gray-100 font-sans">

    <header class="bg-blue-600 text-white p-4 text-center text-xl font-bold shadow-lg">
        🛒 BUY SHOP - PREMIUM
    </header>

    <div class="max-w-4xl mx-auto p-4">
        <div id="userSection">
            <div class="bg-white rounded-xl p-6 text-center shadow-md mb-6">
                <p class="text-gray-500">আপনার ব্যালেন্স</p>
                <h2 class="text-3xl font-bold text-blue-600">৳ <span id="balance">0.00</span></h2>
                <button onclick="toggleModal('depositModal')" class="mt-4 bg-green-500 text-white px-6 py-2 rounded-lg font-bold">ডিপোজিট করুন</button>
            </div>

            <h3 class="border-l-4 border-blue-600 pl-2 text-lg font-bold mb-4">প্রোডাক্ট লিস্ট</h3>
            <div id="productGrid" class="grid grid-cols-2 gap-4">
                </div>
        </div>

        <div class="mt-10 text-center">
            <button onclick="showAdmin()" class="text-gray-400 text-xs">Admin Login</button>
        </div>
    </div>

    <div id="depositModal" class="modal">
        <div class="bg-white p-6 rounded-xl w-80 text-center">
            <h3 class="font-bold mb-4">পেমেন্ট মেথড সিলেক্ট করুন</h3>
            <button onclick="showAddress('USDT BEP20', '0x22e745...')" class="w-full bg-blue-100 py-2 mb-2 rounded">USDT (BEP20)</button>
            <button onclick="showAddress('TRX TRC20', 'TWASfH7D...')" class="w-full bg-red-100 py-2 mb-2 rounded">TRX (TRC20)</button>
            
            <div id="addrArea" class="hidden mt-4">
                <p class="text-xs break-all bg-gray-100 p-2 rounded" id="targetAddr"></p>
                <input type="number" id="depAmount" placeholder="কত ডলার?" class="w-full border p-2 mt-2 rounded">
                <button onclick="submitDeposit()" class="w-full bg-green-600 text-white mt-2 py-2 rounded">Confirm</button>
            </div>
            <button onclick="toggleModal('depositModal')" class="mt-4 text-red-500">বন্ধ করুন</button>
        </div>
    </div>

    <div id="adminPanel" class="hidden fixed inset-0 bg-white z-[100] p-6 overflow-y-auto">
        <h2 class="text-2xl font-bold mb-4">Admin Dashboard</h2>
        <div class="bg-blue-50 p-4 rounded-lg mb-6">
            <h3 class="font-bold mb-2">নতুন প্রোডাক্ট অ্যাড করুন</h3>
            <input type="text" id="pName" placeholder="নাম" class="w-full border p-2 mb-2">
            <input type="number" id="pPrice" placeholder="দাম" class="w-full border p-2 mb-2">
            <input type="text" id="pImg" placeholder="ছবির লিঙ্ক (URL)" class="w-full border p-2 mb-2">
            <button onclick="addProduct()" class="bg-blue-600 text-white w-full py-2 rounded">Add to Web</button>
        </div>
        <button onclick="hideAdmin()" class="bg-gray-500 text-white px-4 py-2 rounded">Back to Shop</button>
    </div>

    <script>
        // ডেটা সেভ করার জন্য LocalStorage ব্যবহার করা হয়েছে (সার্ভার ছাড়া কাজ করবে)
        let products = JSON.parse(localStorage.getItem('products')) || [];

        function toggleModal(id) { document.getElementById(id).classList.toggle('active'); }

        function showAddress(name, addr) {
            document.getElementById('addrArea').classList.remove('hidden');
            document.getElementById('targetAddr').innerText = name + ": " + addr;
        }

        // প্রোডাক্ট অ্যাড করা (Admin Only)
        function addProduct() {
            const name = document.getElementById('pName').value;
            const price = document.getElementById('pPrice').value;
            const img = document.getElementById('pImg').value;

            if(!name || !price) return alert("তথ্য দিন");

            products.push({ name, price, img });
            localStorage.setItem('products', JSON.stringify(products));
            alert("প্রোডাক্ট অ্যাড হয়েছে!");
            location.reload();
        }

        // প্রোডাক্ট শো করা
        function renderProducts() {
            const grid = document.getElementById('productGrid');
            grid.innerHTML = products.map(p => `
                <div class="bg-white p-3 rounded-lg shadow">
                    <img src="${p.img || 'https://via.placeholder.com/150'}" class="w-full h-32 object-cover rounded">
                    <h4 class="font-bold mt-2">${p.name}</h4>
                    <p class="text-blue-600">৳ ${p.price}</p>
                    <button class="bg-blue-600 text-white w-full py-1 mt-2 rounded text-sm">কিনুন</button>
                </div>
            `).join('');
        }

        function showAdmin() { document.getElementById('adminPanel').classList.remove('hidden'); }
        function hideAdmin() { document.getElementById('adminPanel').classList.add('hidden'); }

        renderProducts();
    </script>
</body>
</html>
