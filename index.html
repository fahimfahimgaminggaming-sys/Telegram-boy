<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fahim Shop</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-gray-900 via-black to-gray-800 text-white">

<header class="text-center p-4 text-2xl font-bold">
🛒 FAHIM SHOP
</header>

<div class="max-w-4xl mx-auto p-4">

<!-- AUTH -->
<div class="text-center mb-4">
<button onclick="register()" class="bg-green-500 px-4 py-2 m-1 rounded">Register</button>
<button onclick="login()" class="bg-blue-500 px-4 py-2 m-1 rounded">Login</button>
<button onclick="logout()" class="bg-red-500 px-4 py-2 m-1 rounded">Logout</button>
</div>

<!-- USER PANEL -->
<div id="userPanel" class="hidden">

<div class="bg-black p-4 rounded-xl text-center mb-4">
<h2>Balance: ৳ <span id="balance">0</span></h2>

<h3 class="mt-3">💳 Crypto Deposit</h3>

<input value="USDT(BEP20): 0x22e745437ee19d36f579e93685040d1a502269bc" class="w-full text-black p-2 my-1">
<input value="ETH: 0x22e745437ee19d36f579e93685040d1a502269bc" class="w-full text-black p-2 my-1">
<input value="BNB: 0x22e745437ee19d36f579e93685040d1a502269bc" class="w-full text-black p-2 my-1">
<input value="TRX: TWASfH7D7ZbZ1pkH9tzja4b37RgNHScTtQ" class="w-full text-black p-2 my-1">

<input id="depAmount" type="number" placeholder="Deposit Amount" class="text-black p-2 mt-2 w-full">
<button onclick="requestDeposit()" class="bg-green-600 w-full mt-2 py-2 rounded">Submit Deposit</button>
</div>

<h3 class="font-bold mb-2">Products</h3>
<div id="products" class="grid grid-cols-2 gap-4"></div>

<h3 class="font-bold mt-6">Orders</h3>
<div id="orders"></div>

</div>

<!-- ADMIN BUTTON -->
<div class="text-center mt-6">
<button onclick="adminLogin()" class="text-gray-400 text-xs">Admin Panel</button>
</div>

<!-- ADMIN PANEL -->
<div id="adminPanel" class="hidden bg-black p-4 mt-4 rounded-xl">

<h3 class="font-bold">Add Product</h3>
<input id="pName" placeholder="Product Name" class="text-black p-2 w-full my-1">
<input id="pPrice" type="number" placeholder="Price" class="text-black p-2 w-full my-1">
<button onclick="addProduct()" class="bg-blue-600 w-full py-2 rounded">Add Product</button>

<h3 class="font-bold mt-4">Deposit Requests</h3>
<div id="depositList"></div>

</div>

</div>

<script>

// 🔐 ADMIN ACCOUNT (ONLY YOU)
const ADMIN_EMAIL = "admin@fahim.com";
const ADMIN_PASS = "admin123";

// STORAGE
let users = JSON.parse(localStorage.getItem("users")) || [];
let products = JSON.parse(localStorage.getItem("products")) || [];
let deposits = JSON.parse(localStorage.getItem("deposits")) || [];
let currentUser = JSON.parse(localStorage.getItem("currentUser"));

// REGISTER
function register(){
let email = prompt("Email");
let pass = prompt("Password");

users.push({email, pass, balance:0, orders:[]});
localStorage.setItem("users", JSON.stringify(users));
alert("Account Created!");
}

// LOGIN
function login(){
let email = prompt("Email");
let pass = prompt("Password");

let user = users.find(u=>u.email===email && u.pass===pass);

if(user){
localStorage.setItem("currentUser", JSON.stringify(user));
location.reload();
}else{
alert("Wrong Login!");
}
}

// LOGOUT
function logout(){
localStorage.removeItem("currentUser");
location.reload();
}

// LOAD USER
function loadUser(){
if(!currentUser) return;

document.getElementById("userPanel").classList.remove("hidden");
document.getElementById("balance").innerText = currentUser.balance;

renderProducts();
renderOrders();
}

// PRODUCTS
function renderProducts(){
let div = document.getElementById("products");

div.innerHTML = products.map((p,i)=>`
<div class="bg-gray-900 rounded-2xl p-4 shadow hover:scale-105 transition">
<h4 class="text-xl">${p.name}</h4>
<p class="text-green-400">৳ ${p.price}</p>
<button onclick="buy(${i})" class="bg-gradient-to-r from-blue-500 to-purple-500 w-full py-2 mt-2 rounded">Buy</button>
</div>
`).join("");
}

// BUY
function buy(i){
let location = prompt("Enter Location");
let product = products[i];
let total = product.price + 120;

if(currentUser.balance < total){
alert("Not enough balance");
return;
}

currentUser.balance -= total;

currentUser.orders.push({
name: product.name,
price: product.price,
location,
status:"Pending"
});

updateUser();
alert("Order placed!");
}

// ORDERS
function renderOrders(){
let div = document.getElementById("orders");

div.innerHTML = currentUser.orders.map(o=>`
<div class="bg-gray-800 p-2 mb-2 rounded">
${o.name} - ৳${o.price} <br>
📍 ${o.location} <br>
Status: ${o.status}
</div>
`).join("");
}

// DEPOSIT REQUEST
function requestDeposit(){
let amount = document.getElementById("depAmount").value;

deposits.push({
email: currentUser.email,
amount,
status:"pending"
});

localStorage.setItem("deposits", JSON.stringify(deposits));
alert("Deposit Request Sent!");
}

// ADMIN LOGIN (ONLY YOUR ACCOUNT)
function adminLogin(){
let email = prompt("Admin Email");
let pass = prompt("Admin Password");

if(email === ADMIN_EMAIL && pass === ADMIN_PASS){
document.getElementById("adminPanel").classList.remove("hidden");
renderDeposits();
}else{
alert("Access Denied");
}
}

// ADD PRODUCT
function addProduct(){
let name = document.getElementById("pName").value;
let price = Number(document.getElementById("pPrice").value);

products.push({name, price});
localStorage.setItem("products", JSON.stringify(products));

alert("Product Added!");
location.reload();
}

// SHOW DEPOSITS
function renderDeposits(){
let div = document.getElementById("depositList");

div.innerHTML = deposits.map((d,i)=>`
<div class="border p-2 my-1">
${d.email} - ৳${d.amount}
<button onclick="approve(${i})" class="bg-green-500 px-2 ml-2">Approve</button>
</div>
`).join("");
}

// APPROVE
function approve(i){
let dep = deposits[i];
let user = users.find(u=>u.email===dep.email);

user.balance += Number(dep.amount);

localStorage.setItem("users", JSON.stringify(users));

deposits.splice(i,1);
localStorage.setItem("deposits", JSON.stringify(deposits));

alert("Approved!");
location.reload();
}

// UPDATE USER
function updateUser(){
let index = users.findIndex(u=>u.email===currentUser.email);

users[index] = currentUser;

localStorage.setItem("users", JSON.stringify(users));
localStorage.setItem("currentUser", JSON.stringify(currentUser));

loadUser();
}

// INIT
loadUser();

</script>

</body>
</html>
