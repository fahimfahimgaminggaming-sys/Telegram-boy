<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TON PRO - Major Fahim</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; overflow: hidden; }
        .glass { background: rgba(20, 20, 20, 0.9); backdrop-filter: blur(15px); border: 1px solid #222; border-radius: 28px; }
        .tab { display: none; }
        .active { display: block; animation: fadeIn 0.4s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body class="p-5 pb-24">

    <div id="home" class="tab active">
        <div class="flex justify-between items-center mb-8">
            <h1 class="text-xl font-black italic tracking-tighter">TON <span class="text-blue-500">PRO</span></h1>
            <div class="bg-blue-600/20 px-3 py-1 rounded-full border border-blue-500/30 text-[10px] font-bold text-blue-400">MAJOR FAHIM</div>
        </div>

        <div class="glass p-10 mb-6 flex flex-col items-center shadow-2xl shadow-blue-900/20">
            <p class="text-gray-500 text-[10px] uppercase tracking-[0.3em] mb-3">Available Balance</p>
            <h2 id="bal-val" class="text-5xl font-black mb-2">0.00 <span class="text-blue-500 text-2xl uppercase">Ton</span></h2>
            <p id="bdt-val" class="text-green-500 font-bold text-xs tracking-widest">≈ ৳0.00 BDT</p>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <button onclick="showTab('send')" class="glass p-6 flex flex-col items-center gap-2 active:scale-95 transition">
                <span class="text-2xl">📤</span>
                <span class="text-[10px] font-black uppercase tracking-widest text-blue-500">Send Asset</span>
            </button>
            <button onclick="showTab('deposit')" class="glass p-6 flex flex-col items-center gap-2 active:scale-95 transition">
                <span class="text-2xl">📥</span>
                <span class="text-[10px] font-black uppercase tracking-widest text-orange-500">Deposit</span>
            </button>
        </div>
    </div>

    <div id="send" class="tab">
        <button onclick="showTab('home')" class="mb-6 text-gray-500 text-sm">❮ Back</button>
        <div class="space-y-6">
            <div class="glass p-4">
                <label class="text-[9px] text-blue-500 font-black uppercase mb-1 block">Recipient</label>
                <input id="target" type="text" placeholder="UQ..." class="w-full bg-transparent outline-none font-mono text-sm">
            </div>
            <div class="glass p-4">
                <label class="text-[9px] text-blue-500 font-black uppercase mb-1 block">Amount</label>
                <input id="amt" type="number" placeholder="0.00" class="w-full bg-transparent outline-none text-3xl font-black">
            </div>
            <button onclick="processSend()" class="w-full bg-blue-600 py-5 rounded-[24px] font-black tracking-widest">CONFIRM SEND</button>
        </div>
    </div>

    <div id="deposit" class="tab text-center">
        <button onclick="showTab('home')" class="mb-6 text-gray-500 text-sm block">❮ Back</button>
        <div class="glass p-8 flex flex-col items-center">
            <div id="qrcode" class="bg-white p-3 rounded-2xl mb-6 shadow-xl"></div>
            <p id="addr-txt" class="text-[9px] font-mono break-all text-gray-400 mb-4"></p>
            <button onclick="copyAddr()" class="text-blue-500 font-black text-[10px] uppercase">Copy Wallet Address</button>
        </div>
    </div>

    <script>
        const tele = window.Telegram.WebApp;
        tele.expand();

        const params = new URLSearchParams(window.location.search);
        const balance = parseFloat(params.get('balance')) || 0.00;
        const wallet = params.get('wallet') || "Address Error";

        // UI সিঙ্ক
        document.getElementById('bal-val').innerHTML = `${balance.toFixed(2)} <span class="text-blue-500 text-2xl uppercase">Ton</span>`;
        document.getElementById('bdt-val').innerText = `≈ ৳${(balance * 685).toLocaleString()} BDT`;
        document.getElementById('addr-txt').innerText = wallet;

        function showTab(id) {
            tele.HapticFeedback.impactOccurred('medium');
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'deposit') {
                document.getElementById('qrcode').innerHTML = "";
                new QRCode(document.getElementById("qrcode"), { text: wallet, width: 180, height: 180 });
            }
        }

        function copyAddr() {
            navigator.clipboard.writeText(wallet);
            tele.showAlert("Address Copied! ✅");
        }

        function processSend() {
            const to = document.getElementById('target').value;
            const amt = document.getElementById('amt').value;
            if(!to || !amt || amt > balance) return tele.showAlert("Check amount or address!");

            tele.showConfirm(`Send ${amt} TON?`, (ok) => {
                if(ok) {
                    tele.sendData(JSON.stringify({action: "send", to: to, amount: amt}));
                    tele.close();
                }
            });
        }
    </script>
</body>
</html>
