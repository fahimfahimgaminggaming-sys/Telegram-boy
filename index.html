<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TON PRO v26.0 - Official Terminal</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .action-card { background: #0f0f0f; border: 1px solid #1a1a1a; border-radius: 24px; transition: 0.2s; }
        .action-card:active { transform: scale(0.95); background: #151515; }
        .gradient-border { border: 1px solid; border-image: linear-gradient(to right, #0088ff, #00ffcc) 1; }
        .shimmer { animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: .5; } }
    </style>
</head>
<body class="p-5">

    <div class="flex justify-between items-center mb-6">
        <div>
            <h1 class="text-xl font-bold tracking-tighter text-blue-500">TON<span class="text-white">PRO</span></h1>
            <p id="sync-text" class="text-[9px] text-gray-500 font-bold uppercase tracking-widest">● Connecting to Node...</p>
        </div>
        <div class="w-10 h-10 rounded-full bg-blue-500/10 flex items-center justify-center border border-blue-500/20">
            <span class="text-blue-500 text-xs font-bold">MF</span>
        </div>
    </div>

    <div class="bg-[#0a0a0a] p-8 rounded-[32px] border border-white/5 mb-6 text-center">
        <p class="text-[10px] text-gray-500 uppercase font-bold mb-2 tracking-widest">Total Portfolio Value</p>
        <h2 id="main-bal" class="text-5xl font-black italic mb-2 tracking-tighter">0.00</h2>
        <p id="bdt-val" class="text-green-500 font-bold text-sm">৳0.00 BDT</p>
    </div>

    <div class="grid grid-cols-2 gap-4 mb-8">
        <button onclick="showDeposit()" class="action-card p-6 flex flex-col items-center gap-3">
            <div class="w-12 h-12 rounded-full bg-green-500/10 flex items-center justify-center">
                <svg class="w-6 h-6 text-green-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 14l-7 7m0 0l-7-7m7 7V3"></path></svg>
            </div>
            <span class="text-xs font-black uppercase tracking-widest">Deposit</span>
        </button>
        
        <button onclick="showSend()" class="action-card p-6 flex flex-col items-center gap-3">
            <div class="w-12 h-12 rounded-full bg-blue-500/10 flex items-center justify-center">
                <svg class="w-6 h-6 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 10l7-7m0 0l7 7m-7-7v18"></path></svg>
            </div>
            <span class="text-xs font-black uppercase tracking-widest">Send</span>
        </button>
    </div>

    <div class="bg-[#0a0a0a] rounded-3xl border border-white/5 overflow-hidden">
        <div class="p-4 border-b border-white/5 flex justify-between items-center bg-white/[0.02]">
            <span class="text-[10px] font-bold text-gray-500 uppercase">Assets</span>
            <span class="text-[10px] text-blue-500 font-bold uppercase">Mainnet</span>
        </div>
        <div class="p-5 flex justify-between items-center border-b border-white/5">
            <div class="flex items-center gap-4">
                <div class="w-10 h-10 rounded-xl bg-blue-600 flex items-center justify-center font-bold">T</div>
                <div><p class="text-sm font-bold uppercase">TON Network</p><p class="text-[10px] text-gray-500" id="ton-rate-show">$0.00</p></div>
            </div>
            <p id="ton-val-list" class="text-sm font-bold">0.00</p>
        </div>
        <div class="p-5 flex justify-between items-center">
            <div class="flex items-center gap-4">
                <div class="w-10 h-10 rounded-xl bg-green-500 flex items-center justify-center font-bold">U</div>
                <div><p class="text-sm font-bold uppercase">Tether USDT</p><p class="text-[10px] text-gray-500">Fixed $1.00</p></div>
            </div>
            <p id="usdt-bal-list" class="text-sm font-bold">0.00</p>
        </div>
    </div>

    <div class="mt-6">
        <button onclick="handleSwap()" class="w-full bg-blue-600 py-5 rounded-3xl font-black text-xs uppercase tracking-widest shadow-lg shadow-blue-600/20 active:scale-95 transition">
            Quick Swap ⚡
        </button>
    </div>

    <script>
        const tele = window.Telegram.WebApp;
        tele.expand();

        const TON_API_KEY = 'AE53JZWGNDEQCXIAAAAJP5W44GTSYV5I7ODQNKL7WKMANYMB47UC67HGFFBC7NBMSZGEM2A';
        const MY_WALLET = "UQBEt6y0FdSQD6DO0VLGOrNjqtBFwL1j5gijfd0jmXZp-SQT"; // বস আপনার ওয়ালেট অ্যাড্রেস এখানে নিশ্চিত করুন

        async function syncData() {
            try {
                document.getElementById('sync-text').innerText = "● Syncing...";
                
                // ১. মার্কেট রেট
                const resRate = await fetch('https://api.coingecko.com/api/v3/simple/price?ids=the-open-network&vs_currencies=bdt,usd');
                const rateData = await resRate.json();
                const bdtRate = rateData['the-open-network'].bdt;
                const usdRate = rateData['the-open-network'].usd;

                // ২. ওয়ালেট ডাটা
                const resAcc = await fetch(`https://tonapi.io/v2/accounts/${MY_WALLET}`, {
                    headers: { 'Authorization': `Bearer ${TON_API_KEY}` }
                });
                const accData = await resAcc.json();
                const tonBalance = (accData.balance / 1e9);

                // ৩. জেটটন (USDT)
                const resJet = await fetch(`https://tonapi.io/v2/accounts/${MY_WALLET}/jettons`, {
                    headers: { 'Authorization': `Bearer ${TON_API_KEY}` }
                });
                const jetData = await resJet.json();
                let usdt = 0;
                jetData.balances.forEach(j => { if(j.jetton.symbol === 'USDT') usdt = (j.balance / 1e6); });

                // UI আপডেট
                document.getElementById('main-bal').innerText = tonBalance.toFixed(2);
                document.getElementById('ton-val-list').innerText = tonBalance.toFixed(2);
                document.getElementById('usdt-bal-list').innerText = usdt.toFixed(2);
                document.getElementById('bdt-val').innerText = "≈ ৳" + (tonBalance * bdtRate).toLocaleString();
                document.getElementById('ton-rate-show').innerText = "$" + usdRate;
                
                document.getElementById('sync-text').innerText = "● Node Status: Active";
                document.getElementById('sync-text').style.color = "#22c55e";

            } catch (e) {
                document.getElementById('sync-text').innerText = "● Node Error: Retrying...";
                document.getElementById('sync-text').style.color = "#ef4444";
            }
        }

        function showDeposit() {
            tele.showPopup({
                title: 'Your Deposit Address',
                message: MY_WALLET,
                buttons: [{id: 'copy', type: 'default', text: 'Copy Address'}]
            }, (id) => {
                if(id === 'copy') {
                    navigator.clipboard.writeText(MY_ADDRESS);
                    tele.HapticFeedback.notificationOccurred('success');
                }
            });
        }

        function showSend() {
            tele.showAlert("Send feature requires Admin approval. Contact Major Fahim.");
        }

        function handleSwap() {
            tele.HapticFeedback.impactOccurred('heavy');
            tele.showAlert("Swap Terminal loading... Connect to Ston.fi");
        }

        syncData();
        setInterval(syncData, 15000);
    </script>
</body>
</html>
