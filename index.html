<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fahim Shop Pro</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-black via-gray-900 to-black text-white">

<header class="text-center p-5 text-3xl font-bold tracking-wide">
✨ FAHIM SHOP PRO
</header>

<div class="max-w-5xl mx-auto p-4">

<!-- AUTH -->
<div class="flex justify-center gap-3 mb-6">
<button onclick="register()" class="bg-green-500 px-5 py-2 rounded-xl">Register</button>
<button onclick="login()" class="bg-blue-500 px-5 py-2 rounded-xl">Login</button>
<button onclick="logout()" class="bg-red-500 px-5 py-2 rounded-xl">Logout</button>
</div>

<!-- USER PANEL -->
<div id="userPanel" class="hidden">

<!-- BALANCE -->
<div class="bg-white/10 backdrop-blur-lg p-6 rounded-2xl shadow-xl text-center mb-6">
<h2 class="text-xl mb-2">Balance</h2>
<p class="text-3xl text-green-400 font-bold">৳ <span id="balance">0</span></p>

<h3 class="mt-4 font-semibold">💳 Crypto Deposit</h3>

<div class="mt-2 space-y-2">
<div class="flex">
<input id="usdt" value="0x22e745437ee19d36f579e93685040d1a502269bc" class="text-black w-full p-2 rounded-l">
<button onclick="copy('usdt')" class="bg-blue-600 px-3 rounded-r">Copy</button>
</div>

<div class="flex">
<input id="trx" value="TWASfH7D7ZbZ1pkH9tzja4b37RgNHScTtQ" class="text-black w-full p-2 rounded-l">
<button onclick="copy('trx')" class="bg-blue-600 px-3 rounded-r">Copy</button>
</div>
</div>

<input id="depAmount" type="number" placeholder="Enter amount" class="text-black p-2 mt-4 w-full rounded">
<button onclick="requestDeposit()" class="bg-green-600 w-full mt-2 py-2 rounded-xl">Submit</button>
</div>

<!-- PRODUCTS -->
<h3 class="text-xl mb-3 font-bold">🛍 Products</h3>
<div id="products" class="grid grid-cols-2 md:grid-cols-3 gap-4"></div>

<!-- ORDERS -->
<h3 class="text-xl mt-6 font-bold">📦 Orders</h3>
<div id="orders"></div>

</div>

<!-- ADMIN -->
<div class="text-center mt-6">
<button onclick="adminLogin()" class="text-gray-400 text-sm">Admin Panel</button>
</div>

<div id="adminPanel" class="hidden bg-white/10 p-5 mt-4 rounded-2xl">

<h3 class="font-bold mb-2">Add Product</h3>
<input id="pName" placeholder="Name" class="text-black p-2 w-full mb-2 rounded">
<input id="pPrice" type="number" placeholder="Price" class="text-black p-2 w-full mb-2 rounded">
<button onclick="addProduct()" class="bg-blue-600 w-full py-2 rounded-xl">Add</button>

<h3 class="mt-4 font-bold">Deposits</h3>
<div id="depositList"></div>

</div>

</div>

<script>
// ADMIN
const ADMIN_EMAIL = "admin@fahim.com";
const ADMIN_PASS = "admin123";

// STORAGE
let users = JSON.parse(localStorage.getItem("users")) || [];
let products = JSON.parse(localStorage.getItem("products")) || [];
let deposits = JSON.parse(localStorage.getItem("deposits")) || [];
let currentUser = JSON.parse(localStorage.getItem("currentUser"));

// COPY
function copy(id){
let val = document.getElementById(id).value;
navigator.clipboard.writeText(val);
alert("Copied!");
}

// REGISTER
function register(){
let email = prompt("Email");
let pass = prompt("Password");
users.push({email, pass, balance:0, orders:[]});
localStorage.setItem("users", JSON.stringify(users));
alert("Account created!");
}

// LOGIN
function login(){
let email = prompt("Email");
let pass = prompt("Password");

let user = users.find(u=>u.email===email && u.pass===pass);

if(user){
localStorage.setItem("currentUser", JSON.stringify(user));
location.reload();
}else alert("Wrong!");
}

// LOGOUT
function logout(){
localStorage.removeItem("currentUser");
location.reload();
}

// LOAD
function loadUser(){
if(!currentUser) return;

document.getElementById("userPanel").classList.remove("hidden");
document.getElementById("balance").innerText = currentUser.balance;

renderProducts();
renderOrders();
}

// PRODUCTS
function renderProducts(){
let div = document.getElementById("products");

div.innerHTML = products.map((p,i)=>`
<div class="bg-white/10 backdrop-blur p-4 rounded-xl hover:scale-105 transition">
<h4 class="font-bold">${p.name}</h4>
<p class="text-green-400">৳ ${p.price}</p>
<button onclick="buy(${i})" class="bg-gradient-to-r from-blue-500 to-purple-500 w-full mt-2 py-2 rounded-xl">Buy</button>
</div>
`).join("");
}

// BUY
function buy(i){
let location = prompt("Enter location");
let product = products[i];
let total = product.price + 120;

if(currentUser.balance < total){
alert("Balance low");
return;
}

currentUser.balance -= total;

currentUser.orders.push({
name: product.name,
price: product.price,
location,
status:"Pending"
});

updateUser();
alert("Order placed!");
}

// ORDERS
function renderOrders(){
let div = document.getElementById("orders");

div.innerHTML = currentUser.orders.map(o=>`
<div class="bg-white/10 p-3 rounded mb-2">
${o.name} - ৳${o.price} <br>
📍 ${o.location} <br>
Status: ${o.status}
</div>
`).join("");
}

// DEPOSIT
function requestDeposit(){
let amount = document.getElementById("depAmount").value;

deposits.push({
email: currentUser.email,
amount,
status:"pending"
});

localStorage.setItem("deposits", JSON.stringify(deposits));
alert("Request sent");
}

// ADMIN LOGIN
function adminLogin(){
let email = prompt("Admin Email");
let pass = prompt("Admin Password");

if(email===ADMIN_EMAIL && pass===ADMIN_PASS){
document.getElementById("adminPanel").classList.remove("hidden");
renderDeposits();
}else alert("Denied");
}

// ADD PRODUCT
function addProduct(){
let name = document.getElementById("pName").value;
let price = Number(document.getElementById("pPrice").value);

products.push({name, price});
localStorage.setItem("products", JSON.stringify(products));

alert("Added");
location.reload();
}

// DEPOSITS
function renderDeposits(){
let div = document.getElementById("depositList");

div.innerHTML = deposits.map((d,i)=>`
<div class="border p-2 my-1">
${d.email} - ৳${d.amount}
<button onclick="approve(${i})" class="bg-green-500 px-2 ml-2">Approve</button>
</div>
`).join("");
}

// APPROVE
function approve(i){
let dep = deposits[i];
let user = users.find(u=>u.email===dep.email);

user.balance += Number(dep.amount);

localStorage.setItem("users", JSON.stringify(users));

deposits.splice(i,1);
localStorage.setItem("deposits", JSON.stringify(deposits));

alert("Approved");
location.reload();
}

// UPDATE
function updateUser(){
let index = users.findIndex(u=>u.email===currentUser.email);

users[index] = currentUser;

localStorage.setItem("users", JSON.stringify(users));
localStorage.setItem("currentUser", JSON.stringify(currentUser));

loadUser();
}

// INIT
loadUser();
</script>

</body>
</html>
