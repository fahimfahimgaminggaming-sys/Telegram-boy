<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TON PRO Mini App</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0f172a; color: white; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(255, 255, 255, 0.05); backdrop-filter: blur(10px); border-radius: 20px; border: 1px solid rgba(255, 255, 255, 0.1); }
        .btn-gradient { background: linear-gradient(90deg, #0088cc, #00aaff); transition: 0.3s; }
        .btn-gradient:hover { opacity: 0.8; transform: scale(0.98); }
    </style>
</head>
<body class="p-5">
    <div class="flex justify-between items-center mb-8">
        <h1 class="text-xl font-bold text-blue-400">TON PRO <span class="text-white text-xs">v1.0</span></h1>
        <div id="user-name" class="text-sm bg-blue-900/30 px-3 py-1 rounded-full border border-blue-500/30">Loading...</div>
    </div>

    <div class="glass p-6 mb-6 text-center">
        <p class="text-gray-400 text-sm mb-1">Total Balance</p>
        <h2 class="text-4xl font-bold mb-2">124.50 <span class="text-lg text-blue-400">TON</span></h2>
        <p class="text-green-400 text-sm font-medium">≈ ৳85,420.00 BDT</p>
    </div>

    <div class="grid grid-cols-2 gap-4 mb-8">
        <button class="glass p-4 btn-gradient flex flex-col items-center" onclick="sendAction()">
            <span class="text-2xl mb-1">🚀</span>
            <span class="text-sm font-bold">Send</span>
        </button>
        <button class="glass p-4 flex flex-col items-center" onclick="depositAction()">
            <span class="text-2xl mb-1">📥</span>
            <span class="text-sm font-bold">Deposit</span>
        </button>
    </div>

    <div class="glass p-5 mb-8">
        <h3 class="text-md font-bold mb-4 flex items-center">
            <span class="mr-2">📈</span> Market Analysis
        </h3>
        <div class="flex justify-between items-center bg-white/5 p-3 rounded-xl">
            <div>
                <p class="text-xs text-gray-400">TON / USD</p>
                <p class="font-bold">$7.24</p>
            </div>
            <div class="text-right">
                <p class="text-xs text-green-400">+5.24%</p>
                <p class="text-[10px] text-gray-500">24h Change</p>
            </div>
        </div>
    </div>

    <script>
        // Telegram Web App Initialization
        const tele = window.Telegram.WebApp;
        tele.expand(); // অ্যাপটি পুরো স্ক্রিনে ওপেন হবে
        
        // ইউজার নাম সেট করা
        document.getElementById('user-name').innerText = tele.initDataUnsafe.user?.first_name || "Boss";

        function sendAction() {
            tele.showAlert("টাকা পাঠানোর অপশনটি বোটের '🚀 টাকা পাঠান' বাটনে দেখুন।");
        }

        function depositAction() {
            tele.showConfirm("আপনি কি ডিপোজিট অ্যাড্রেস দেখতে চান?", (confirmed) => {
                if(confirmed) tele.close(); // বোটের ডিপোজিট বাটন ইউজ করতে বলবে
            });
        }
    </script>
</body>
</html>
