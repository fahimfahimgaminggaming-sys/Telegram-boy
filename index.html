<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TON PRO v22.0</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { background-color: #000; color: #fff; font-family: 'Inter', sans-serif; }
        .glass-card { background: #1c1c1e; border: 1px solid #333; border-radius: 24px; }
        .tab-content { display: none; }
        .active { display: block; }
        .circle-btn { background: #007aff; width: 55px; height: 55px; border-radius: 50%; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .circle-btn:active { transform: scale(0.9); }
        input { background: #2c2c2e; border: 1px solid #444; border-radius: 12px; padding: 12px; width: 100%; color: white; outline: none; }
    </style>
</head>
<body class="p-6">

    <div id="home" class="tab-content active">
        <div class="text-center my-10">
            <p class="text-gray-400 text-xs">Total Balance in <span class="text-blue-500 font-bold text-sm">USD</span> 👁️</p>
            <h1 class="text-5xl font-bold mt-2">$0.11</h1>
        </div>

        <div class="flex justify-center gap-16 mb-12">
            <button onclick="showTab('send')" class="flex flex-col items-center gap-2">
                <div class="circle-btn text-2xl">⬆️</div>
                <span class="text-xs font-bold">Send</span>
            </button>
            <button onclick="showTab('deposit')" class="flex flex-col items-center gap-2">
                <div class="circle-btn text-2xl">⬇️</div>
                <span class="text-xs font-bold">Deposit</span>
            </button>
        </div>

        <h2 class="text-xl font-bold mb-4">My assets</h2>
        <div class="glass-card p-4 flex justify-between items-center">
            <div class="flex items-center gap-4">
                <div class="w-12 h-12 bg-blue-600 rounded-full flex items-center justify-center font-bold text-xl">💎</div>
                <div><p class="font-bold">TON</p><p class="text-[10px] text-green-400">$1.3364 (+3.39%)</p></div>
            </div>
            <p class="text-xl font-bold">0.09</p>
        </div>
    </div>

    <div id="send" class="tab-content">
        <h2 class="text-2xl font-bold mb-6">Send TON</h2>
        <div class="space-y-5">
            <input type="text" id="target" placeholder="Recipient TON Address">
            <div>
                <input type="number" id="amt" placeholder="Amount (e.g. 0.05)">
                <p class="text-[10px] text-blue-400 mt-2 ml-1">Bot Balance: 0.09 TON</p>
            </div>
            <button onclick="processSend()" class="w-full bg-blue-600 py-4 rounded-xl font-bold mt-4">Confirm & Send</button>
            <button onclick="showTab('home')" class="w-full text-gray-500 text-sm">Cancel</button>
        </div>
    </div>

    <div id="deposit" class="tab-content">
        <h2 class="text-2xl font-bold mb-6 text-center">Deposit Address</h2>
        <div class="glass-card p-8 flex flex-col items-center">
            <div id="qrcode" class="bg-white p-2 rounded-lg mb-6"></div>
            <p class="text-[10px] text-gray-500 mb-4 text-center break-all">UQD7-YOUR-REAL-BOT-WALLET-ADDRESS</p>
            <button onclick="window.Telegram.WebApp.showAlert('Address Copied!')" class="text-blue-500 font-bold">Copy Address</button>
        </div>
        <button onclick="showTab('home')" class="w-full mt-8 text-gray-500">← Back</button>
    </div>

    <div class="fixed bottom-6 left-6 right-6 h-16 bg-[#1c1c1e]/90 backdrop-blur-md rounded-3xl border border-gray-800 flex justify-around items-center">
        <button onclick="showTab('home')" class="flex flex-col items-center opacity-100">🏠<span class="text-[10px]">Wallet</span></button>
        <button onclick="window.Telegram.WebApp.showAlert('History loading from MongoDB...')" class="flex flex-col items-center opacity-50">📜<span class="text-[10px] uppercase">transitions</span></button>
    </div>

    <script>
        const tele = window.Telegram.WebApp;
        tele.expand();

        function showTab(id) {
            tele.HapticFeedback.selectionChanged();
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'deposit') {
                document.getElementById('qrcode').innerHTML = "";
                new QRCode(document.getElementById("qrcode"), { text: "UQD7-YOUR-REAL-BOT-WALLET-ADDRESS", width: 150, height: 150 });
            }
        }

        function processSend() {
            const to = document.getElementById('target').value;
            const amount = document.getElementById('amt').value;
            if(!to || !amount) return tele.showAlert("সবগুলো ঘর পূরণ করুন!");
            
            tele.showConfirm(`আপনি কি নিশ্চিত?`, (ok) => {
                if(ok) {
                    tele.sendData(JSON.stringify({action: "send", to: to, amount: amount}));
                    tele.close();
                }
            });
        }
    </script>
</body>
</html>
