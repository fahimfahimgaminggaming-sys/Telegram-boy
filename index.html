<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TON PRO v6.0 - Terminal</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; }
        .card { background: #0c0c0c; border: 1px solid #1f1f1f; border-radius: 24px; }
        .glow-blue { box-shadow: 0 0 20px rgba(0, 122, 255, 0.2); }
        .token-row { border-bottom: 1px solid #111; }
        .token-row:last-child { border-bottom: none; }
    </style>
</head>
<body class="p-5">

    <div class="flex justify-between items-center mb-6">
        <div>
            <h1 class="text-lg font-black italic text-blue-500">TON<span class="text-white italic">PRO</span></h1>
            <p class="text-[8px] text-gray-600 uppercase tracking-[0.3em]">Institutional Grade Terminal</p>
        </div>
        <div id="status-dot" class="w-2 h-2 rounded-full bg-green-500 animate-pulse"></div>
    </div>

    <div class="card p-8 mb-6 glow-blue relative overflow-hidden">
        <div class="absolute top-0 right-0 p-4 opacity-5 italic font-black text-4xl">SECURE</div>
        <p class="text-[9px] text-gray-500 uppercase font-bold mb-2">Available TON Balance</p>
        <div class="flex items-baseline gap-2">
            <h2 id="main-bal" class="text-5xl font-black italic">0.00</h2>
            <span class="text-blue-500 font-bold">TON</span>
        </div>
        <p id="bdt-val" class="text-[10px] text-green-500 font-bold mt-2">≈ ৳0.00 BDT</p>
    </div>

    <div class="card overflow-hidden">
        <div class="p-4 bg-white/5 flex justify-between items-center">
            <span class="text-[10px] font-black text-gray-400 uppercase">Live Asset Portfolio</span>
            <span class="text-[9px] text-blue-400 font-bold" id="sync-text">SYNCED</span>
        </div>
        
        <div id="asset-container" class="divide-y divide-[#111]">
            <div class="p-4 flex justify-between items-center token-row">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 rounded-full bg-green-500/10 flex items-center justify-center font-bold text-green-500">U</div>
                    <div>
                        <p class="text-sm font-bold">Tether USDT</p>
                        <p class="text-[9px] text-gray-500 font-mono">TON Network</p>
                    </div>
                </div>
                <div class="text-right">
                    <p id="usdt-bal" class="text-sm font-bold text-white">0.00</p>
                    <p class="text-[9px] text-gray-500 italic">Checking...</p>
                </div>
            </div>
            
            </div>
    </div>

    <div class="fixed bottom-6 left-6 right-6 flex gap-3">
        <button onclick="tele.showAlert('Trade system connecting...')" class="flex-1 bg-blue-600 py-4 rounded-2xl font-black text-xs uppercase tracking-widest shadow-lg shadow-blue-600/30">Quick Swap</button>
        <button onclick="tele.close()" class="w-16 bg-[#111] border border-[#222] rounded-2xl flex items-center justify-center text-xl">✕</button>
    </div>

    <script>
        const tele = window.Telegram.WebApp;
        tele.expand();

        // --- আপনার TON API KEY সরাসরি এখানে অ্যাড করা হয়েছে ---
        const TON_API_KEY = 'AE53JZWGNDEQCXIAAAAJP5W44GTSYV5I7ODQNKL7WKMANYMB47UC67HGFFBC7NBMSZGEM2A';
        
        const params = new URLSearchParams(window.location.search);
        const walletAddr = params.get('wallet') || "UQAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAJKZ"; 

        async function fetchRealtimeData() {
            try {
                document.getElementById('sync-text').innerText = "REFRESHING...";
                
                // ১. TON Balance & BDT Rate Fetch
                const response = await fetch(`https://tonapi.io/v2/accounts/${walletAddr}`, {
                    headers: { 'Authorization': `Bearer ${TON_API_KEY}` }
                });
                const data = await response.json();
                const tonBal = (data.balance / 1e9).toFixed(2);
                document.getElementById('main-bal').innerText = tonBal;

                // ২. Jettons (USDT/Tokens) Fetch
                const jettonResponse = await fetch(`https://tonapi.io/v2/accounts/${walletAddr}/jettons`, {
                    headers: { 'Authorization': `Bearer ${TON_API_KEY}` }
                });
                const jettonData = await jettonResponse.json();
                
                let foundUSDT = false;
                jettonData.balances.forEach(item => {
                    if(item.jetton.symbol === 'USDT') {
                        const val = (item.balance / Math.pow(10, item.jetton.decimals)).toFixed(2);
                        document.getElementById('usdt-bal').innerText = val;
                        foundUSDT = true;
                    }
                });

                document.getElementById('sync-text').innerText = "SYNCED";
                document.getElementById('status-dot').classList.replace('bg-orange-500', 'bg-green-500');

            } catch (error) {
                console.error("API Error:", error);
                document.getElementById('sync-text').innerText = "ERROR";
                document.getElementById('status-dot').classList.replace('bg-green-500', 'bg-orange-500');
            }
        }

        // শুরুতে একবার ডাটা লোড হবে
        fetchRealtimeData();
        // প্রতি ৩০ সেকেন্ড পরপর অটোমেটিক আপডেট হবে
        setInterval(fetchRealtimeData, 30000);

    </script>
</body>
</html>
