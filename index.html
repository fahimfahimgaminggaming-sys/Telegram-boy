<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Fahim Shop Pro</title>
<script src="https://cdn.tailwindcss.com"></script>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js"></script>
</head>

<body class="bg-gray-900 text-white">

<header class="text-center p-4 text-2xl font-bold">
🛒 FAHIM SHOP PRO
</header>

<div class="max-w-4xl mx-auto p-4">

<!-- LOGIN -->
<div class="bg-gray-800 p-4 rounded-xl">
<h2 class="font-bold mb-2">Login / Register</h2>

<input id="email" placeholder="Email" class="w-full p-2 text-black mb-2">
<input id="pass" type="password" placeholder="Password" class="w-full p-2 text-black mb-2">

<button onclick="register()" class="bg-green-500 px-4 py-2 rounded">Register</button>
<button onclick="login()" class="bg-blue-500 px-4 py-2 rounded">Login</button>
<button onclick="logout()" class="bg-red-500 px-4 py-2 rounded">Logout</button>
</div>

<!-- USER PANEL -->
<div id="panel" class="hidden mt-4">

<h2 class="text-lg">Balance: ৳ <span id="balance">0</span></h2>

<h3 class="font-bold mt-4">Products</h3>
<div id="products" class="grid grid-cols-2 gap-3"></div>

<h3 class="font-bold mt-4">Cart</h3>
<div id="cart"></div>

<h3 class="font-bold mt-4">Orders</h3>
<div id="orders"></div>

</div>

<!-- ADMIN -->
<div class="text-center mt-6">
<button onclick="adminLogin()" class="text-gray-400 text-sm">Admin Panel</button>
</div>

<div id="adminPanel" class="hidden bg-gray-800 p-4 mt-4 rounded-xl">
<h3 class="font-bold">Add Product</h3>

<input id="pName" placeholder="Name" class="w-full p-2 text-black mb-2">
<input id="pPrice" type="number" placeholder="Price" class="w-full p-2 text-black mb-2">

<button onclick="addProduct()" class="bg-blue-600 w-full py-2">Add</button>
</div>

</div>

<script>

// 🔥 FIREBASE CONFIG (replace yours)
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "fahimshop-4d622.firebaseapp.com",
  databaseURL: "https://fahimshop-4d622-default-rtdb.firebaseio.com",
  projectId: "fahimshop-4d622",
  appId: "YOUR_APP_ID"
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.database();

// ADMIN
const ADMIN_EMAIL = "admin@fahim.com";

// CART (local)
let cart = [];

// REGISTER
function register(){
let email = emailInput();
let pass = passInput();

auth.createUserWithEmailAndPassword(email, pass)
.then(user=>{
db.ref("users/"+user.user.uid).set({
email,
balance:0
});
alert("Registered");
})
.catch(e=>alert(e.message));
}

// LOGIN
function login(){
auth.signInWithEmailAndPassword(emailInput(), passInput())
.then(u=>{
loadUser();
})
.catch(e=>alert(e.message));
}

// LOGOUT
function logout(){
auth.signOut();
location.reload();
}

// LOAD USER
function loadUser(){
let user = auth.currentUser;
if(!user) return;

document.getElementById("panel").classList.remove("hidden");

// balance
db.ref("users/"+user.uid).on("value", snap=>{
document.getElementById("balance").innerText = snap.val().balance || 0;
});

// products
db.ref("products").on("value", snap=>{
let data = snap.val() || {};
renderProducts(data);
});

// orders
db.ref("orders/"+user.uid).on("value", snap=>{
let data = snap.val() || {};
renderOrders(data);
});
}

// PRODUCTS
function renderProducts(data){
let div = document.getElementById("products");

div.innerHTML = Object.keys(data).map(id=>`
<div class="bg-gray-700 p-3 rounded">
${data[id].name} <br>
৳ ${data[id].price}
<button onclick="addToCart('${id}',${data[id].price})" class="bg-green-500 w-full mt-2">Add</button>
</div>
`).join("");
}

// CART
function addToCart(id,price){
cart.push({id,price});
renderCart();
}

function renderCart(){
let div = document.getElementById("cart");

div.innerHTML = cart.map((c,i)=>`
<div>
Item ${i+1} - ৳${c.price}
</div>
<button onclick="checkout()">Checkout</button>
`).join("");
}

// CHECKOUT
function checkout(){
let user = auth.currentUser;
if(!user) return;

let total = cart.reduce((a,b)=>a+b.price,0);

db.ref("orders/"+user.uid).push({
items: cart,
total,
status:"pending"
});

cart = [];
alert("Order placed!");
}

// ORDERS
function renderOrders(data){
let div = document.getElementById("orders");

div.innerHTML = Object.values(data).map(o=>`
<div class="bg-gray-800 p-2 mb-2">
Total: ৳${o.total} | ${o.status}
</div>
`).join("");
}

// ADMIN LOGIN
function adminLogin(){
let email = prompt("Email");
let pass = prompt("Password");

if(email===ADMIN_EMAIL && pass==="admin123"){
document.getElementById("adminPanel").classList.remove("hidden");
}else alert("Denied");
}

// ADD PRODUCT
function addProduct(){
let name = document.getElementById("pName").value;
let price = Number(document.getElementById("pPrice").value);

db.ref("products").push({name,price});
alert("Product added");
}

// INPUT HELPERS
function emailInput(){
return document.getElementById("email").value;
}

function passInput(){
return document.getElementById("pass").value;
}

// AUTH STATE
auth.onAuthStateChanged(user=>{
if(user){
loadUser();
}
});

</script>

</body>
  </html>
