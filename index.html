<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TON PRO - Major Fahim</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; }
        .glass { background: rgba(20, 20, 20, 0.9); border: 1px solid #333; border-radius: 30px; }
        .tab { display: none; }
        .active { display: block; animation: slideUp 0.4s ease; }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body class="p-6">

    <div id="home" class="tab active">
        <h1 class="text-center font-black italic text-xl mb-10 text-blue-500 uppercase">TON PRO Wallet</h1>
        
        <div class="glass p-10 flex flex-col items-center mb-8">
            <p class="text-[10px] text-gray-500 uppercase tracking-widest mb-2">Total Balance</p>
            <h2 id="bal" class="text-5xl font-black italic">0.00 <span class="text-blue-500 text-2xl uppercase">Ton</span></h2>
            <p id="bdt" class="text-green-500 font-bold text-[10px] mt-2 italic">≈ ৳0 BDT</p>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <button onclick="showTab('send')" class="glass p-6 flex flex-col items-center gap-2">
                <span class="text-2xl">⚡</span>
                <p class="text-[10px] font-bold uppercase text-blue-400">Send</p>
            </button>
            <button onclick="showTab('deposit')" class="glass p-6 flex flex-col items-center gap-2">
                <span class="text-2xl">💎</span>
                <p class="text-[10px] font-bold uppercase text-orange-400">Deposit</p>
            </button>
        </div>
    </div>

    <div id="send" class="tab">
        <button onclick="showTab('home')" class="text-gray-500 mb-6">❮ Back</button>
        <div class="space-y-6">
            <div class="glass p-4">
                <label class="text-[9px] font-bold text-blue-500 uppercase">Address</label>
                <input id="target" type="text" placeholder="UQ..." class="w-full bg-transparent outline-none font-mono text-sm">
            </div>
            <div class="glass p-4">
                <label class="text-[9px] font-bold text-blue-500 uppercase">Amount</label>
                <input id="amt" type="number" placeholder="0.00" class="w-full bg-transparent outline-none text-3xl font-black">
            </div>
            <button onclick="processTx()" class="w-full bg-blue-600 py-5 rounded-[25px] font-black uppercase tracking-widest shadow-xl shadow-blue-600/30">Confirm & Send</button>
        </div>
    </div>

    <div id="deposit" class="tab text-center">
        <button onclick="showTab('home')" class="text-gray-500 mb-6 self-start">❮ Back</button>
        <div class="glass p-10 flex flex-col items-center">
            <div id="qrcode" class="bg-white p-3 rounded-2xl mb-8"></div>
            <p id="addr" class="text-[9px] font-mono text-gray-500 break-all mb-6"></p>
            <button onclick="navigator.clipboard.writeText(addr); tele.showAlert('Address Copied!')" class="text-blue-500 font-bold text-xs underline uppercase">Copy</button>
        </div>
    </div>

    <script>
        const tele = window.Telegram.WebApp;
        tele.expand();

        const params = new URLSearchParams(window.location.search);
        const bal = parseFloat(params.get('balance')) || 0.00;
        const addr = params.get('wallet') || "Error";

        document.getElementById('bal').innerHTML = `${bal.toFixed(2)} <span class="text-blue-500 text-2xl uppercase">Ton</span>`;
        document.getElementById('bdt').innerText = `≈ ৳${(bal * 685).toLocaleString()} BDT`;
        document.getElementById('addr').innerText = addr;

        function showTab(id) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'deposit') {
                document.getElementById('qrcode').innerHTML = "";
                new QRCode(document.getElementById("qrcode"), { text: addr, width: 180, height: 180 });
            }
        }

        function processTx() {
            const to = document.getElementById('target').value;
            const amount = document.getElementById('amt').value;
            if(!to || !amount || amount > bal) return tele.showAlert("Invalid data!");
            
            tele.showConfirm(`Confirm sending ${amount} TON?`, (ok) => {
                if(ok) {
                    tele.sendData(JSON.stringify({action: "send", to: to, amount: amount}));
                    tele.close();
                }
            });
        }
    </script>
</body>
</html>
